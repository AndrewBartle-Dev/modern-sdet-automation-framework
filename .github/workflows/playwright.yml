name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      BASE_URL: http://localhost:8080/parabank

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Start ParaBank
      run: docker compose up -d

    - name: Verify ParaBank Container
      run: docker ps

    - name: Wait for ParaBank
      run: |
        for i in {1..30}; do
          if curl -s http://localhost:8080/parabank > /dev/null; then
            echo "ParaBank is running"
            exit 0
          fi
          echo "Waiting for ParaBank..."
          sleep 5
        done

        echo "ParaBank did not start in time"
        docker compose logs
        exit 1

    - name: Run Playwright tests
      run: npx playwright test

    - name: Generate Allure Report
      if: always()
      run: npx allure generate allure-results --clean -o allure-report

    - name: Upload Playwright Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Allure Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30

    - name: Upload GitHub Pages Artifact
      if: always() && github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: allure-report

    - name: Deploy Allure Report to GitHub Pages
      if: always() && github.ref == 'refs/heads/main'
      uses: actions/deploy-pages@v4