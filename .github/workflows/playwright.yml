name: Playwright Tests

on:
  push:
    branches: [main, master, feature/ui-e2e-tests]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  BASE_URL: https://eventhub.rahulshettyacademy.com
  API_BASE_URL: https://api.eventhub.rahulshettyacademy.com/api
  TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

jobs:
  api-tests:
    name: API Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Wait for API to be ready
        run: |
          curl --retry 5 --retry-delay 2 --fail \
          https://api.eventhub.rahulshettyacademy.com/api/health

      - name: Run API tests
        run: npx playwright test --grep @api

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 7

  ui-tests:
    name: UI Tests
    needs: api-tests
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: npx playwright test --grep @ui

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results/
          retention-days: 7

  report:
    name: Publish Report
    needs: [api-tests, ui-tests]
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download API results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-api
          path: allure-results/

      - name: Download UI results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-ui
          path: allure-results/

      - name: Generate Allure Report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy Allure Report to GitHub Pages
        uses: actions/deploy-pages@v4
