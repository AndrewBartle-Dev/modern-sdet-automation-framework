name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      BASE_URL: http://localhost:8080/parabank

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Start ParaBank
      run: docker compose up -d

    - name: Verify ParaBank Container
      run: docker ps

    - name: Wait for ParaBank
      run: |
        for i in {1..30}; do
          if curl -s http://localhost:8080/parabank > /dev/null; then
            echo "ParaBank is running"
            exit 0
          fi
          echo "Waiting for ParaBank..."
          sleep 5
        done

        echo "ParaBank did not start in time"
        docker compose logs
        exit 1

    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30